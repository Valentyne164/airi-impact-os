<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AIRI · Impact OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --green:#084734;--green-700:#0a5a42;--green-900:#05281d;
    --lime:#cef17b;--lime-deep:#acd84e;
    --bg:#eef3ec;--card:#fff;--ink:#0e1f18;--muted:#5c6b63;
    --line:#e1e9e2;--line-strong:#cdd9ce;
    --ok:#1f9d6b;--ok-bg:#e4f5ec;--warn:#c98209;--warn-bg:#fbefd7;
    --bad:#cf412c;--bad-bg:#fadfd9;--pending:#6b6443;--pending-bg:#f3f0d8;
    --shadow:0 1px 2px rgba(8,71,52,.05),0 12px 28px rgba(8,71,52,.07);
    --shadow-lg:0 18px 48px rgba(8,71,52,.18);--r:16px;
    --sans:"IBM Plex Sans",system-ui,sans-serif;--display:"Bricolage Grotesque",var(--sans);--mono:"IBM Plex Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  ::selection{background:var(--lime)}
  button{font:inherit;cursor:pointer;border:0;background:none}
  h1,h2,h3,h4{font-family:var(--display);font-weight:600;letter-spacing:-.015em;line-height:1.14}
  a{color:inherit}

  /* ---------- Login ---------- */
  .login{min-height:100vh;display:grid;place-items:center;padding:24px;
    background:radial-gradient(120% 80% at 50% -10%,rgba(206,241,123,.22),transparent 55%),linear-gradient(180deg,#0b5640,var(--green-900))}
  .login-card{background:var(--card);border-radius:24px;padding:40px;max-width:560px;width:100%;box-shadow:var(--shadow-lg)}
  .login .brand{display:flex;align-items:center;gap:13px;margin-bottom:8px}
  .login .brand .mark{width:48px;height:48px;border-radius:14px;background:var(--green);color:var(--lime);display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:1.2rem}
  .login .brand b{font-family:var(--display);font-size:1.5rem}
  .login .brand small{color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-size:.72rem}
  .login p.lead{color:var(--muted);margin:14px 0 26px}
  .choose{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .choice{border:1.5px solid var(--line-strong);border-radius:16px;padding:20px;text-align:left;transition:.15s;background:#fff}
  .choice:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:var(--shadow)}
  .choice .ic{width:40px;height:40px;border-radius:11px;background:#e3f0e9;color:var(--green);display:grid;place-items:center;margin-bottom:12px}
  .choice .ic svg{width:20px;height:20px}
  .choice b{display:block;font-family:var(--display);font-size:1.08rem}
  .choice span{font-size:.84rem;color:var(--muted)}
  .login .staffpick{margin-top:18px;display:none}
  .login .staffpick.show{display:block}
  @media(max-width:560px){.choose{grid-template-columns:1fr}}

  /* ---------- App shell ---------- */
  .app{display:grid;grid-template-columns:264px 1fr;min-height:100vh}
  aside{background:radial-gradient(120% 60% at 20% -5%,rgba(206,241,123,.16),transparent 60%),linear-gradient(180deg,var(--green),var(--green-900));color:#dcebe2;padding:22px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .logo{display:flex;align-items:center;gap:12px;padding:4px 6px 20px}
  .logo .mark{width:42px;height:42px;border-radius:12px;background:var(--lime);color:var(--green);display:grid;place-items:center;font-family:var(--display);font-weight:700}
  .logo b{font-family:var(--display);color:#fff;font-size:1.12rem;display:block}
  .logo small{color:#9fc3b2;font-size:.72rem;letter-spacing:.05em;text-transform:uppercase}
  nav{display:flex;flex-direction:column;gap:3px;flex:1;margin-top:6px}
  nav button{display:flex;align-items:center;gap:11px;width:100%;color:#c5dccf;padding:10px 12px;border-radius:10px;text-align:left;font-size:.92rem;font-weight:500;position:relative;transition:.15s}
  nav button:hover{background:rgba(255,255,255,.08);color:#fff}
  nav button.active{background:rgba(206,241,123,.14);color:#fff;font-weight:600}
  nav button.active::before{content:"";position:absolute;left:-16px;top:8px;bottom:8px;width:4px;background:var(--lime);border-radius:0 4px 4px 0}
  nav button svg{width:18px;height:18px;flex-shrink:0}
  nav button .count{margin-left:auto;background:var(--lime);color:var(--green);font-family:var(--mono);font-size:.72rem;font-weight:700;padding:1px 7px;border-radius:999px}
  .me{display:flex;align-items:center;gap:10px;padding:11px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;margin-bottom:10px}
  .me .av{width:34px;height:34px;border-radius:9px;background:var(--lime);color:var(--green);display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:.82rem}
  .me .who b{color:#fff;font-size:.88rem;display:block;line-height:1.2}
  .me .who span{color:#9fc3b2;font-size:.74rem}
  .me button{margin-left:auto;color:#cfe3d7;font-size:.76rem;text-decoration:underline}
  .gov{background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px;font-size:.74rem;line-height:1.5;color:#cfe3d7}
  .gov b{color:var(--lime);display:block;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}

  main{overflow:hidden}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 32px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.6);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20}
  .topbar h1{font-size:1.45rem}
  .topbar .sub{color:var(--muted);font-size:.88rem;margin-top:3px}
  .top-right{display:flex;align-items:center;gap:12px}
  .branch-sel{display:flex;align-items:center;gap:8px;font-size:.82rem;font-weight:600;color:var(--muted)}
  .branch-sel select{padding:8px 11px;border:1px solid var(--line-strong);border-radius:10px;font:inherit;font-size:.86rem;background:#fff;font-weight:600;color:var(--ink)}
  .alert-pill{display:flex;align-items:center;gap:7px;background:var(--warn-bg);color:var(--warn);border:1px solid #f0d49a;padding:7px 12px;border-radius:999px;font-size:.8rem;font-weight:600}
  .alert-pill svg{width:14px;height:14px}

  .screen{padding:26px 32px 64px;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .grid{display:grid;gap:18px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
  .c2{grid-template-columns:1.4fr .9fr}
  @media(max-width:1100px){.c2{grid-template-columns:1fr}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
  .card h3{font-size:1.05rem}
  .card .hint{color:var(--muted);font-size:.83rem}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}

  .kpi .label{color:var(--muted);font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:7px}
  .kpi .num{font-family:var(--mono);font-size:1.95rem;font-weight:600;margin:9px 0 3px;letter-spacing:-.02em}
  .kpi .num small{font-size:.95rem;color:var(--muted)}
  .kpi .meta{font-size:.8rem;font-weight:600}
  .pending-tag{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:.74rem;font-weight:600;color:var(--pending);background:var(--pending-bg);padding:3px 8px;border-radius:6px}
  .bar{height:8px;background:#eef2ee;border-radius:999px;overflow:hidden;margin-top:11px}
  .bar .fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green-700));border-radius:999px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .bar .fill.lime{background:linear-gradient(90deg,var(--lime-deep),var(--lime))}
  .up{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}

  .chart{height:190px;display:flex;align-items:flex-end;gap:16px;padding:14px 4px 0}
  .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
  .col .track{width:100%;max-width:50px;background:#eef2ee;border-radius:9px 9px 0 0;height:100%;display:flex;align-items:flex-end;overflow:hidden}
  .col .val{width:100%;background:linear-gradient(180deg,var(--green-700),var(--green));border-radius:9px 9px 0 0;transition:height .7s cubic-bezier(.2,.8,.2,1);min-height:4px}
  .col .val.lead{background:linear-gradient(180deg,var(--lime),var(--lime-deep))}
  .col .cap{font-size:.74rem;color:var(--muted);font-weight:600;text-align:center}
  .col .pct{font-family:var(--mono);font-size:.76rem;font-weight:600}

  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:12px;border-bottom:1px solid var(--line);font-size:.88rem;vertical-align:middle}
  th{color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;font-weight:700}
  tr:last-child td{border-bottom:0}
  td.num,th.num{font-family:var(--mono);text-align:right}
  tbody tr:hover{background:#f7faf6}

  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:.75rem;font-weight:700;white-space:nowrap}
  .badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .b-ok{color:var(--ok);background:var(--ok-bg)}.b-warn{color:var(--warn);background:var(--warn-bg)}
  .b-bad{color:var(--bad);background:var(--bad-bg)}.b-pending{color:var(--pending);background:var(--pending-bg)}.b-info{color:var(--green);background:#e3f0e9}

  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:#fff;padding:11px 17px;border-radius:11px;font-weight:600;font-size:.9rem;transition:.15s}
  .btn:hover{background:var(--green-900);transform:translateY(-1px)}
  .btn svg{width:16px;height:16px}
  .btn.lime{background:var(--lime);color:var(--green)}.btn.lime:hover{background:var(--lime-deep)}
  .btn.ghost{background:#eef4ee;color:var(--green)}.btn.ghost:hover{background:#e2ece4}
  .btn.sm{padding:7px 12px;font-size:.82rem;border-radius:9px}
  .btn.ok{background:var(--ok)}.btn.ok:hover{background:#178455}
  .btn.danger-ghost{background:var(--bad-bg);color:var(--bad)}.btn.danger-ghost:hover{background:#f5cec4}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

  label.field{display:block;margin-bottom:14px;font-weight:600;font-size:.82rem}
  label.field input,label.field select,label.field textarea{width:100%;margin-top:7px;padding:11px 12px;border:1px solid var(--line-strong);border-radius:10px;font:inherit;font-size:.9rem;background:#fff;color:var(--ink);transition:.15s}
  label.field input:focus,label.field select:focus,label.field textarea:focus{outline:0;border-color:var(--green);box-shadow:0 0 0 3px rgba(8,71,52,.12)}
  textarea{min-height:80px;resize:vertical}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px}

  .report{background:#fafdf8;border:1px dashed var(--line-strong);padding:20px;border-radius:13px;line-height:1.65;font-size:.91rem;white-space:pre-wrap}
  .report h4{font-family:var(--display);font-size:1.05rem;margin-bottom:8px;color:var(--green)}
  .pill{display:inline-block;padding:5px 11px;border-radius:999px;background:#e3f0e9;color:var(--green);font-size:.76rem;font-weight:600;margin:2px 4px 2px 0}

  .queue-item{padding:15px;border:1px solid var(--line);border-radius:13px;margin-bottom:12px;background:#fff}
  .qi-head{display:flex;align-items:flex-start;gap:12px}
  .qi-head .ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex-shrink:0;background:#e3f0e9;color:var(--green)}
  .qi-head .ico svg{width:18px;height:18px}
  .qi-head .body{flex:1;min-width:0}
  .qi-head .body b{font-size:.92rem}
  .qi-head .body p{font-size:.82rem;color:var(--muted);margin-top:2px}
  .qi-head .acts{display:flex;gap:7px;flex-shrink:0}
  .edit-grid{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);display:none}
  .edit-grid.show{display:block}
  .mini{font-size:.74rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:2px 0 5px}

  .empty{text-align:center;padding:42px 20px;color:var(--muted)}
  .empty svg{width:38px;height:38px;opacity:.4;margin-bottom:8px}
  .empty p{font-family:var(--display);font-size:1.05rem}
  .lock-note{display:flex;align-items:center;gap:10px;background:#e3f0e9;color:var(--green);padding:12px 15px;border-radius:11px;font-size:.86rem;font-weight:500;margin-bottom:16px;border:1px solid #cde2d5}
  .lock-note svg{width:18px;height:18px;flex-shrink:0}

  .tabs{display:flex;gap:8px;margin-bottom:18px;border-bottom:1px solid var(--line)}
  .tabs button{padding:11px 4px;font-weight:600;font-size:.92rem;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
  .tabs button.on{color:var(--green);border-color:var(--green)}

  .metric-row{display:grid;grid-template-columns:1.7fr 1.15fr .75fr auto;gap:9px;align-items:center;padding:9px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;background:#fbfdfa}
  .metric-row input,.metric-row select{padding:8px 9px;border:1px solid var(--line-strong);border-radius:8px;font:inherit;font-size:.84rem;width:100%}
  .metric-row .lockedrow{font-size:.82rem;color:var(--muted);font-weight:600}
  .metric-row .chk{display:flex;align-items:center;gap:5px;font-size:.78rem;font-weight:600;color:var(--muted)}
  .metric-row .del{color:var(--bad);font-size:1.1rem;font-weight:700;padding:4px 8px}
  .metric-row.locked{background:#eef4ee}
  .metric-head{display:grid;grid-template-columns:1.6fr .9fr .7fr .8fr auto;gap:9px;padding:0 9px 6px;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
  @media(max-width:900px){.metric-head{display:none}}
  .help-legend{display:flex;flex-direction:column;gap:5px;background:#f3f7f2;border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:12px;font-size:.8rem;color:var(--muted)}
  .help-legend b{color:var(--green)} .help-legend i{color:var(--muted)}
  .prev-box{background:#f7faf6;border:1px solid var(--line);border-radius:12px;padding:13px}
  .prev-field{margin-bottom:10px}
  .prev-lbl{display:block;font-size:.78rem;font-weight:600;margin-bottom:4px}
  .prev-input{background:#fff;border:1px solid var(--line-strong);border-radius:8px;padding:8px 10px;font-size:.82rem;color:var(--muted)}
  .prev-input.tall{min-height:38px}
  .prev-kpi{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-bottom:7px;font-size:.84rem;font-weight:600}
  .prev-kpi b{font-family:var(--mono)}
  /* login extras */
  .choice.sel{border-color:var(--green);box-shadow:0 0 0 3px rgba(8,71,52,.12)}
  .loginform{margin-top:18px;padding-top:18px;border-top:1px solid var(--line)}
  .demo-codes{margin-top:20px;background:#f3f7f2;border:1px dashed var(--line-strong);border-radius:11px;padding:11px 13px;font-size:.76rem;color:var(--muted);line-height:1.7}
  .demo-codes b{display:block;color:var(--green);text-transform:uppercase;letter-spacing:.06em;font-size:.68rem;margin-bottom:3px}
  .demo-codes code{background:#fff;border:1px solid var(--line-strong);border-radius:5px;padding:1px 6px;font-family:var(--mono);color:var(--ink);font-weight:600}
  /* manager note to staff */
  .mgr-note{display:flex;gap:8px;align-items:flex-start;margin-top:11px;padding:10px 12px;border-radius:10px;font-size:.84rem;line-height:1.45}
  .mgr-note svg{width:15px;height:15px;flex-shrink:0;margin-top:2px}
  .mgr-note.ok{background:var(--ok-bg);color:#176046} .mgr-note.warn{background:var(--warn-bg);color:#7a5208} .mgr-note.bad{background:var(--bad-bg);color:#8f2c1c}
  .lock-note.warn-note{background:var(--warn-bg);color:#7a5208;border-color:#f0d49a}
  /* quick-add suggestion chips */
  .quick-add{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
  .quick-add button{background:#eef4ee;color:var(--green);border:1px dashed var(--line-strong);border-radius:999px;padding:6px 12px;font-size:.8rem;font-weight:600}
  .quick-add button:hover{background:var(--lime);border-style:solid}
  /* deadline timeline */
  .timeline-h{display:flex;gap:10px;flex-wrap:wrap}
  .tl-step{flex:1;min-width:120px;display:flex;gap:9px;align-items:flex-start;padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:#fbfdfa;opacity:.6}
  .tl-step .tl-dot{width:11px;height:11px;border-radius:50%;background:var(--line-strong);margin-top:4px;flex-shrink:0}
  .tl-step b{font-size:.85rem}
  .tl-step.done{opacity:1;border-color:#cde2d5;background:#eef6ef}.tl-step.done .tl-dot{background:var(--ok)}
  .tl-step.cur{opacity:1;border-color:var(--warn);background:var(--warn-bg);box-shadow:0 0 0 2px rgba(201,130,9,.15)}.tl-step.cur .tl-dot{background:var(--warn)}
  /* evidence files */
  .ev-files{display:flex;flex-wrap:wrap;gap:8px}
  .ev-file{display:inline-flex;align-items:center;gap:7px;background:#f3f7f2;border:1px solid var(--line-strong);border-radius:9px;padding:8px 12px;font-size:.83rem;font-weight:600;color:var(--green)}
  .ev-file:hover{background:var(--lime)}
  .ev-file svg{width:15px;height:15px}
  .exec-tile .num{font-size:1.75rem}
  .locked-agreement{background:#f3f7f2;border:1px solid var(--line);border-radius:12px;padding:14px}
  @media(max-width:900px){.metric-row{grid-template-columns:1fr 1fr}}

  .program-card{border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;background:#fff}
  .program-card h4{font-size:1.05rem;margin-bottom:4px}
  .program-card .aim{font-size:.86rem;color:var(--muted);margin-bottom:10px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green-900);color:#fff;padding:13px 20px;border-radius:12px;font-size:.88rem;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;transition:.3s;z-index:200;display:flex;align-items:center;gap:10px;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast svg{width:17px;height:17px;color:var(--lime)}
  .activity-row{display:flex;gap:13px;padding:12px 0;border-bottom:1px solid var(--line);align-items:flex-start}
  .activity-row:last-child{border:0}
  .activity-row .tdot{width:9px;height:9px;border-radius:50%;background:var(--lime-deep);margin-top:6px;flex-shrink:0}
  .activity-row .at{font-family:var(--mono);font-size:.76rem;color:var(--muted);white-space:nowrap;margin-left:auto}
  @media(max-width:860px){.app{grid-template-columns:1fr}aside{position:static;height:auto}.screen,.topbar{padding:16px}}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script>
const TODAY=new Date('2026-06-04');
const ISO=d=>d.toISOString().slice(0,10);

const I={
  dash:'<path d="M3 3h7v7H3zM14 3h7v4h-7zM14 10h7v11h-7zM3 14h7v7H3z"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  inbox:'<path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5 5h14l3 7v6a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-6z"/>',
  pen:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>',
  grant:'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/>',
  scale:'<path d="M12 3v18M5 7l-3 6h6zM19 7l-3 6h6zM7 21h10"/>',

function agg(b,m){const ls=approvedFor(b.id);if(m.type==='yesno')return (m.base||0)+ls.filter(l=>l.values[m.id]===true).length;if(m.type==='number')return (m.base||0)+ls.reduce((a,l)=>a+(+l.values[m.id]||0),0);return null;}
function pend(b,m){const ls=pendingFor(b.id);if(m.type==='yesno')return ls.filter(l=>l.values[m.id]===true).length;if(m.type==='number')return ls.reduce((a,l)=>a+(+l.values[m.id]||0),0);return 0;}
const goalMetrics=b=>b.metrics.filter(m=>m.type!=='text'&&m.target>0);
function impact(b){const g=goalMetrics(b);if(!g.length)return 0;return Math.round(g.reduce((a,m)=>a+Math.min(1,agg(b,m)/m.target),0)/g.length*100);}

/* --- agreement-to-impact engine --- */
function commitmentActual(g,c){
  const b=branch(g.branchId);
  if(c.kind==='budget')return{display:fmt$(grantSpent(g))+' / '+fmt$(c.target),pct:Math.round(grantSpent(g)/c.target*100),met:grantSpent(g)<=c.target,sub:'Spend under '+fmt$(c.target),src:'manager-logged expenses'};
  if(!b)return{display:'— / '+c.target,pct:0,met:false,sub:'Target '+c.target,src:'link a program to track'};
  const m=b.metrics.find(x=>x.id===c.metricId)||b.metrics.find(x=>x.label.toLowerCase().includes((c.label.split(' ')[1]||'').toLowerCase()));
  if(c.kind==='percent'){
    const reach=b.metrics.find(x=>x.type==='number');
    const a=m&&reach?Math.round(agg(b,m)/Math.max(1,agg(b,reach))*100):0;
    return{display:a+'% / '+c.target+'%',pct:Math.round(a/c.target*100),met:a>=c.target,sub:'Target '+c.target+'%',src:m?'staff field: “'+m.label+'”':'no matching field'};
  }
  const a=m?agg(b,m):0;
  return{display:a+' / '+c.target,pct:Math.round(a/c.target*100),met:a>=c.target,sub:'Target '+c.target,src:m?'staff field: “'+m.label+'”':'no matching field'};
}
function extractCommitments(text,b){
  const out=[],seen=new Set();
  const num=s=>+s.replace(/[, ]/g,'');
  const add=(label,kind,target,metricId)=>{if(seen.has(label))return;seen.add(label);out.push({id:'x'+out.length,label,kind,target,metricId});};
  const metByWords=(...w)=>b.metrics.find(m=>w.some(x=>m.label.toLowerCase().includes(x)))?.id;
  let mm;
  if(mm=text.match(/train(?:ing)?\s+(?:up\s+to\s+)?([\d, ]+)\s*(?:participants|people|learners|individuals)/i))add('Train participants','count',num(mm[1]),metByWords('people','participant','train','reach','student'));
  if(mm=text.match(/(?:reach|serve|enrol[l]?)\s+(?:up\s+to\s+)?([\d, ]+)\s*(?:participants|people|residents|students|youth)/i))add('Reach participants','count',num(mm[1]),metByWords('people','reach','student','participant'));
  if(mm=text.match(/(?:deliver|run|host|hold)\s+([\d, ]+)\s*(?:workshops|sessions|events|clinics)/i))add('Deliver workshops','count',num(mm[1]),metByWords('workshop','session'));
  if(mm=text.match(/([\d]+)\s*%\s*(?:women|girls|female)/i))add('Women participation','percent',num(mm[1]),metByWords('women','girl','female'));
  if(mm=text.match(/(?:create|form|start|establish)\s+([\d, ]+)\s*(?:cohorts|groups|clubs)/i))add('Create cohorts','count',num(mm[1]),metByWords('cohort','group'));
  if(mm=text.match(/(?:complete|issue|award)\s+([\d, ]+)\s*(?:certifications|certificates|credentials)/i))add('Certifications','count',num(mm[1]),metByWords('cert'));
  if(mm=text.match(/(?:under|below|less than|max(?:imum)?|not exceed(?:ing)?|budget of|up to)\s*\$?\s*([\d, ]{4,})/i))add('Spend under','budget',num(mm[1]));
  return out;
}

/* --- executive stats --- */
function totalPeople(){return db.branches.reduce((a,b)=>{const m=b.metrics.find(x=>x.type==='number');return a+(m?agg(b,m):0);},0);}
function execStats(){return{funding:db.grants.reduce((a,g)=>a+g.amount,0),people:totalPeople(),programs:db.branches.length,reportsDue:reportsDueCount(),impact:Math.round(db.branches.reduce((a,b)=>a+impact(b),0)/db.branches.length),compliance:avgCompliance()};}
function commitmentPhrase(c){
  if(c.kind==='budget')return 'spend under '+fmt$(c.target);
  if(c.kind==='percent')return 'reach '+c.target+'% '+c.label.toLowerCase().replace('participation','').replace('women','women').trim();
  return c.label.toLowerCase()+' ('+c.target+')';
}
function agreementHealth(g){
  const cs=g.commitments||[];if(!cs.length)return{overall:0,met:0,total:0,behind:[]};
  let sum=0,met=0;const behind=[];
  cs.forEach(c=>{const r=commitmentActual(g,c);sum+=Math.min(100,r.pct);if(r.met)met++;else if(r.pct<65)behind.push(c.label);});
  return{overall:Math.round(sum/cs.length),met,total:cs.length,behind};
}
function agreementSummary(g){
  const cs=g.commitments||[];const h=agreementHealth(g);
  if(!cs.length)return 'No commitments parsed yet.';
  const phrases=cs.map(commitmentPhrase);
  const last=phrases.pop();
  return `This agreement with ${g.funder} commits AIRI to ${phrases.join(', ')}${phrases.length?', and ':''}${last}. Against manager-verified data, ${h.met} of ${h.total} commitments are already met and overall delivery sits at ${h.overall}%. ${h.behind.length?'Focus area'+(h.behind.length>1?'s':'')+': '+h.behind.join(', ')+'.':'Every commitment is on or ahead of track.'}`;
}

/* --- grant finances --- */
function grantSpent(g){return db.expenses.filter(e=>e.grantId===g.id).reduce((a,e)=>a+(+e.amount||0),0);}
function grantExpenses(gid){return db.expenses.filter(e=>e.grantId===gid).slice().sort((a,b)=>a.date<b.date?1:-1);}
function burnPct(g){return Math.round(grantSpent(g)/Math.max(1,g.amount)*100);}
function termElapsed(g){if(!g.start||!g.end)return null;const s=new Date(g.start),e=new Date(g.end);const p=Math.round((TODAY-s)/Math.max(1,(e-s))*100);return Math.max(0,Math.min(100,p));}
function burnStatus(g){const t=termElapsed(g),b=burnPct(g);if(t===null)return{label:'—',cls:''};const diff=b-t;if(diff>12)return{label:'Spending ahead of schedule',cls:'bad'};if(diff<-15)return{label:'Underspending vs schedule',cls:'warn'};return{label:'Spending on pace',cls:'up'};}

      ${choice('funder',I.eye,'Funder / Investor','Read-only view of the programs you fund')}
    </div>
    ${m?loginForm(m):''}
    <div class="demo-codes"><b>Demo access codes</b> Manager <code>4021</code> · Staff (Amara) <code>1111</code>, (Diego) <code>2222</code>, (Priya) <code>3333</code> · Funder (Gov't Partner) <code>7001</code>, (Community Foundation) <code>7002</code>, (Innovation Sponsor) <code>7003</code></div>
  </div></div>`;
}
function loginForm(mode){
  if(mode==='manager')return `<div class="loginform"><label class="field">Manager access code<input id="lg_pin" type="password" inputmode="numeric" placeholder="4-digit PIN" onkeydown="if(event.key==='Enter')doLogin('manager')"></label><button class="btn" onclick="doLogin('manager')">${svg(I.check)} Enter manager workspace</button></div>`;
  if(mode==='staff')return `<div class="loginform"><label class="field">Staff member<select id="lg_id">${db.staff.map(s=>`<option value="${s.name}">${s.name}</option>`).join('')}</select></label><label class="field">Your access code<input id="lg_pin" type="password" inputmode="numeric" placeholder="4-digit PIN" onkeydown="if(event.key==='Enter')doLogin('staff')"></label><button class="btn" onclick="doLogin('staff')">${svg(I.check)} Enter staff workspace</button></div>`;
  return `<div class="loginform"><label class="field">Your organisation<select id="lg_id">${db.funders.map(f=>`<option value="${f.id}">${f.org}</option>`).join('')}</select></label><label class="field">Your access code<input id="lg_pin" type="password" inputmode="numeric" placeholder="4-digit PIN" onkeydown="if(event.key==='Enter')doLogin('funder')"></label><button class="btn" onclick="doLogin('funder')">${svg(I.check)} Enter funder workspace</button></div>`;
}
function chooseLogin(mode){db.loginMode=mode;render();setTimeout(()=>document.getElementById('lg_pin')?.focus(),50);}
function initials(n){return n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();}
function doLogin(mode){
  const pin=(document.getElementById('lg_pin')?.value||'').trim();
  if(mode==='manager'){
    if(pin!==db.managerPin)return toast('Incorrect access code');
    db.session={role:'manager',name:'Program Manager',initials:'PM'};db.screen='dashboard';
  }else if(mode==='staff'){
    const name=document.getElementById('lg_id').value, s=db.staff.find(x=>x.name===name);
    if(!s||pin!==s.pin)return toast('Incorrect access code for '+name);
    db.session={role:'staff',name,initials:initials(name)};db.screen='log';
  }else{
    const id=document.getElementById('lg_id').value, f=db.funders.find(x=>x.id===id);
    if(!f||pin!==f.pin)return toast('Incorrect access code');
    db.session={role:'funder',name:f.org,initials:initials(f.org),funderId:f.id};db.screen='fdash';
    const fb=funderBranches(f.id);if(fb.length)db.activeBranch=fb[0];
  }
  db.loginMode=null;render();toast('Signed in as '+db.session.name);
}
function funderGrants(fid){const f=db.funders.find(x=>x.id===fid);return f?db.grants.filter(g=>g.funder===f.org):[];}
function funderBranches(fid){return [...new Set(funderGrants(fid).map(g=>g.branchId))];}
function logout(){db.session=null;db.loginMode=null;render();}

/* ===================== SCREENS ===================== */
const screens={
  dashboard(){
    const b=activeBranch();
    const dashM=b.metrics.filter(m=>m.dash&&m.type!=='text');
    const max=Math.max(0.01,...goalMetrics(b).map(m=>agg(b,m)/m.target));
    const kpiCards=dashM.map(m=>{
      const a=agg(b,m),p=pend(b,m),pct=m.target?Math.round(a/m.target*100):0;
      return `<div class="card kpi"><div class="label">${m.label}</div><div class="num">${a}${m.unit||''}${m.target?` <small>/ ${m.target}${m.unit||''}</small>`:''}</div>${m.target?`<div class="meta up">${pct}% of goal</div><div class="bar"><div class="fill" style="width:${Math.min(100,pct)}%"></div></div>`:''}${p?`<div class="pending-tag">+${p} awaiting approval</div>`:''}</div>`;
    }).join('');
    const budget=`<div class="card kpi"><div class="label">Budget used</div><div class="num">${fmt$(branchSpent(b.id))}</div><div class="meta warn">${Math.round(branchSpent(b.id)/Math.max(1,branchBudget(b.id))*100)}% of ${fmt$(branchBudget(b.id))}</div></div>`;
    const score=`<div class="card kpi"><div class="label">Impact score</div><div class="num">${impact(b)} <small>/ 100</small></div><div class="meta up">composite of goals</div><div class="bar"><div class="fill lime" style="width:${impact(b)}%"></div></div></div>`;
    const agGrant=grantsFor(b.id).find(g=>(g.commitments||[]).length);
    const agTile=agGrant?(()=>{const h=agreementHealth(agGrant);return `<div class="card kpi" style="cursor:pointer" onclick="openGrant('${agGrant.id}')"><div class="label">Agreement health</div><div class="num">${h.overall}<small>%</small></div><div class="meta up">${h.met}/${h.total} commitments met →</div><div class="bar"><div class="fill" style="width:${h.overall}%"></div></div></div>`;})():'';
    const bars=goalMetrics(b).map(m=>{const pct=Math.round(agg(b,m)/m.target*100);return `<div class="col"><div class="pct ${pct>=100?'up':''}">${pct}%</div><div class="track"><div class="val ${pct>=100?'lead':''}" style="height:${Math.max(6,Math.min(100,(agg(b,m)/m.target)/max*100))}%"></div></div><div class="cap">${m.label.split(' ')[0]}</div></div>`;}).join('');
    return `<div class="grid kpis">${kpiCards}${budget}${score}${agTile}</div><div style="height:18px"></div>
      <div class="grid c2">
        <div class="card"><div class="card-head"><h3>Verified progress · ${b.name}</h3><span class="badge b-info">Approved data</span></div><div class="chart">${bars||'<div class="empty"><p>No goal metrics defined.</p></div>'}</div></div>
        <div class="card"><div class="card-head"><h3>Needs review</h3><button class="btn sm ghost" onclick="go('approvals')">Open queue</button></div>${queueHTML(true)}</div>
      </div>`;
  },

  approvals(){return `<div class="card">${queueHTML(false)}</div>`;},

  programs(){
    return `<div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button class="btn lime" onclick="go('newprogram')">${svg(I.plus)} Create new program</button></div>
      ${db.branches.map(b=>`<div class="program-card"><h4>${b.name}</h4><div class="aim">${b.aim}</div>
        <div class="mini">Tracked metrics</div>${b.metrics.map(m=>`<span class="pill">${m.label}${m.target?` · goal ${m.target}${m.unit||''}`:''}${m.type==='text'?' · note':''}</span>`).join('')}
        <div class="mini" style="margin-top:12px">Linked grants</div>${grantsFor(b.id).map(g=>`<span class="pill">${g.name}</span>`).join('')||'<span class="hint">None yet</span>'}
      </div>`).join('')}`;
  },

  newprogram(){
    if(!wiz.metrics.length)resetWiz();
    return `<div class="grid c2">
      <div>
        <div class="card" style="margin-bottom:18px">
          <div class="card-head"><h3>1 · Create a new program</h3></div>
          <label class="field">Program name<input value="${wiz.name}" placeholder="e.g. Rural AI Access Initiative" oninput="wiz.name=this.value"></label>

          <div class="quick-add">
            ${[['People reached','number'],['Sessions / workshops held','yesno'],['New group / cohort started','yesno'],['Women & girls reached','number'],['Evidence / notes','text']].map(([l,t])=>`<button onclick="wizAddPreset('${l}','${t}')">+ ${l}</button>`).join('')}

        </div>

        <div class="card">
          <div class="card-head"><h3>2 · Add the grant & agreement</h3><span class="badge b-info">Optional</span></div>
          <p class="hint" style="margin-bottom:12px">Attach the funding for this program and paste the agreement. We'll extract the commitments so you can analyse it right away.</p>
          <div class="row2">
            <label class="field">Funder<input value="${wiz.gFunder||''}" placeholder="e.g. Community Foundation" oninput="wiz.gFunder=this.value"></label>

          </div>
          <label class="field">Grant agreement text<textarea style="min-height:90px" placeholder="Paste the agreement. e.g. The grantee will train 500 participants, deliver 25 workshops, ensure 40% women participation, and spend under $150,000." oninput="wiz.gAgreement=this.value">${wiz.gAgreement||''}</textarea></label>

      </div>
      <div class="card" style="position:sticky;top:90px;align-self:start">
        <div class="card-head"><h3>Live preview</h3><span class="badge b-info">Updates as you type</span></div>

        <div class="mini" style="margin-top:16px">Numbers shown on the dashboard</div>
        <div id="wizPreviewDash" class="prev-box"></div>
        ${wiz.gAgreement?`<div class="mini" style="margin-top:16px">Commitments we'll extract</div><div class="prev-box">${(()=>{const f=extractCommitments(wiz.gAgreement,{metrics:wiz.metrics.filter(m=>m.label.trim()).map((m,i)=>({id:'p'+i,label:m.label,type:m.type}))});return f.length?f.map(c=>`<div class="prev-kpi"><span>${c.label}</span><b>${c.kind==='percent'?c.target+'%':c.kind==='budget'?fmt$(c.target):c.target}</b></div>`).join(''):'<p class="hint">No commitments detected yet — check the wording.</p>';})()}</div>`:''}
      </div>
    </div>`;
  },

  grants(){
    return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span class="hint">Click a grant to open its dashboard.</span><button class="btn lime" onclick="addGrant()">${svg(I.plus)} Add grant</button></div>
      <div class="card" style="padding:6px 6px 0"><table><thead><tr><th>Grant</th><th>Program</th><th>Funder</th><th class="num">Amount</th><th class="num">Spent</th><th>Agreement</th><th>Deadline</th></tr></thead><tbody>
      ${db.grants.map(g=>{const burn=burnPct(g);const cs=(g.commitments||[]).length;return `<tr style="cursor:pointer" onclick="openGrant('${g.id}')"><td><b>${g.name}</b></td><td>${branch(g.branchId)?.name||'<span class="warn">Unlinked</span>'}</td><td>${g.funder}</td><td class="num">${fmt$(g.amount)}</td><td class="num">${fmt$(grantSpent(g))} <span class="${burn>70?'warn':'up'}" style="font-size:.78rem">(${burn}%)</span></td><td>${cs?`<span class="badge b-ok">${cs} KPIs</span>`:'<span class="badge b-pending">None</span>'}</td><td>${deadlineBadge(g.nextReport)}</td></tr>`;}).join('')}
      </tbody></table></div>`;
  },

  newgrant(){
    const linked=ng.branchId?branch(ng.branchId):null;
    const preview=ng.agreement&&ng.agreement.trim()?extractCommitments(ng.agreement,linked||{metrics:[]}):[];
    return `<div class="grid c2">
      <div class="card">
        <div class="card-head"><h3>New grant</h3></div>
        <label class="field">Grant name<input value="${ng.name}" placeholder="e.g. AI Skills Training Grant" oninput="ng.name=this.value"></label>
        <label class="field">Linked program<select onchange="ng.branchId=this.value;render()"><option value="" ${!ng.branchId?'selected':''}>Not linked yet</option>${db.branches.map(b=>`<option value="${b.id}" ${b.id===ng.branchId?'selected':''}>${b.name}</option>`).join('')}</select></label>
        <div class="row2">
          <label class="field">Funder<input value="${ng.funder}" placeholder="Funder name" oninput="ng.funder=this.value"></label>
          <label class="field">Funder email<input value="${ng.email}" placeholder="reports@funder.org" oninput="ng.email=this.value"></label>
        </div>
        <div class="row3">
          <label class="field">Amount ($)<input type="number" value="${ng.amount}" placeholder="150000" oninput="ng.amount=this.value"></label>
          <label class="field">Term start<input type="date" value="${ng.start}" oninput="ng.start=this.value"></label>
          <label class="field">Term end<input type="date" value="${ng.end}" oninput="ng.end=this.value"></label>

        <label class="field">First report date<input type="date" value="${ng.nextReport}" oninput="ng.nextReport=this.value"></label>
        <div class="mini">Grant agreement</div>
        <p class="hint" style="margin-bottom:8px">Paste the agreement once. Its commitments are extracted and <b>locked to this grant</b> — you never paste it again to check progress. You can update it later if the agreement changes.</p>
        <label class="field" style="margin-bottom:8px"><textarea style="min-height:100px" placeholder="e.g. The grantee will train 500 participants, deliver 25 workshops, ensure 40% women participation, and spend under $150,000." oninput="ng.agreement=this.value">${ng.agreement}</textarea></label>
        <button class="btn ghost sm" onclick="ng.agreement=db.SAMPLE;render()">Use sample</button>
        <div style="margin-top:20px;display:flex;gap:10px"><button class="btn" onclick="saveGrant()">${svg(I.check)} Create grant</button><button class="btn ghost" onclick="go('grants')">Cancel</button></div>
      </div>
      <div class="card" style="position:sticky;top:90px;align-self:start">
