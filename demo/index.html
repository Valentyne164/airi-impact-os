        ${preview.length?preview.map(c=>`<div class="prev-kpi"><span>${c.label}</span><b>${c.kind==='percent'?c.target+'%':c.kind==='budget'?fmt$(c.target):c.target}</b></div>`).join(''):'<p class="hint">Paste the agreement to see the commitments that will be extracted and locked to this grant.</p>'}
        ${!linked&&preview.length?'<div class="lock-note warn-note" style="margin-top:12px">'+svg(I.alert)+' Not linked to a program — impact commitments will track once you link one. Budget commitments work either way.</div>':''}
      </div>
    </div>`;
  },

  granthub(){
    const g=db.grants.find(x=>x.id===db.viewGrant)||db.grants[0];
    db.viewGrant=g.id;
    const b=branch(g.branchId);
    const h=agreementHealth(g);
    const cs=g.commitments||[];
    const burn=burnPct(g), te=termElapsed(g), bs=burnStatus(g);
    const d=dueStatus(g);
    const tile=(label,val,sub,cls)=>`<div class="card kpi"><div class="label">${label}</div><div class="num">${val}</div>${sub?`<div class="meta ${cls||''}">${sub}</div>`:''}</div>`;
    // commitments
    const rows=cs.map(c=>{const r=commitmentActual(g,c);const st=r.met?'<span class="badge b-ok">Met</span>':r.pct>=65?'<span class="badge b-warn">On track</span>':'<span class="badge b-bad">Behind</span>';return `<tr><td><b>${c.label}</b><div class="hint" style="font-size:.74rem">${r.sub} · from ${r.src}</div></td><td class="num">${r.display.split(' / ')[0]}</td><td class="num">${Math.min(999,r.pct)}%</td><td>${st}</td></tr>`;}).join('');
    const bars=cs.map(c=>{const r=commitmentActual(g,c);return `<div class="col"><div class="pct ${r.met?'up':''}">${Math.min(999,r.pct)}%</div><div class="track"><div class="val ${r.met?'lead':''}" style="height:${Math.max(6,Math.min(100,r.pct))}%"></div></div><div class="cap">${c.label.split(' ').slice(0,2).join(' ')}</div></div>`;}).join('');
    // deadline timeline
    const timeline=DEADLINE_STAGES.map(s=>{const done=d.n<=s.offset;const isCur=d.current&&d.current.key===s.key;return `<div class="tl-step ${done?'done':''} ${isCur?'cur':''}"><span class="tl-dot"></span><div><b>${s.label}</b><span class="hint" style="display:block;font-size:.72rem">${s.offset===0?'on due date':s.offset+'d before'}</span></div></div>`;}).join('');

    return `<div style="margin-bottom:14px"><button class="btn ghost sm" onclick="go('grants')">← All grants</button></div>
      <div class="card" style="margin-bottom:18px"><div class="card-head"><div><h3>${g.name}</h3><div class="hint">${g.funder} · ${b?`funds <b>${b.name}</b>`:'<span class="warn">not linked to a program</span>'} · ${g.email}</div></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${deadlineBadge(g.nextReport)}<button class="btn sm ghost" onclick="db.agGrant='${g.id}';go('agreement')">${svg(I.spark)} Edit agreement</button><button class="btn sm" onclick="db.activeBranch='${g.branchId}';db.reportTab='specific';go('reports')">${svg(I.report)} Report</button></div>
      </div></div>

      <div class="grid kpis">
        ${tile('Funding',fmt$(g.amount),g.start&&g.end?`${g.start} → ${g.end}`:'',)}
        ${tile('Spent',fmt$(grantSpent(g)),burn+'% of budget',burn>70?'warn':'up')}
        ${tile('Remaining',fmt$(g.amount-grantSpent(g)),(100-burn)+'% left','up')}
        ${te!==null?tile('Time elapsed',te+'%',bs.label,bs.cls):''}
        ${cs.length?tile('Agreement health',h.overall+'%',`${h.met}/${h.total} commitments met`,'up'):''}
        ${tile('Next report',d.n<0?'Overdue':d.n+'d',g.nextReport,d.n<=7?'bad':d.n<=14?'warn':'up')}
      </div>
      <div style="height:18px"></div>

      <div class="grid c2">
        <div class="card"><div class="card-head"><h3>Impact accountability</h3>${cs.length?'<span class="badge b-info">vs verified data</span>':''}</div>
          ${cs.length?`<div class="chart">${bars}</div><table style="margin-top:10px"><thead><tr><th>Commitment</th><th class="num">Verified</th><th class="num">%</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>`:`<div class="empty">${svg(I.spark)}<p>No commitments yet</p><p class="hint" style="font-family:var(--sans);font-style:normal">${b?'Paste this grant\u2019s agreement to track its promises.':'Link this grant to a program, then add its agreement.'}</p><button class="btn ghost sm" style="margin-top:10px" onclick="db.agGrant='${g.id}';go('agreement')">${svg(I.spark)} Open Agreement Engine</button></div>`}
        </div>
        <div>
          <div class="card" style="margin-bottom:18px"><div class="card-head"><h3>Budget vs time</h3><span class="badge ${bs.cls==='bad'?'b-bad':bs.cls==='warn'?'b-warn':'b-ok'}">${bs.label}</span></div>
            <div class="mini">Budget spent</div><div class="bar" style="height:11px"><div class="fill ${burn>85?'':''}" style="width:${burn}%"></div></div>
            <div style="text-align:right;font-family:var(--mono);font-size:.8rem;margin-top:4px">${burn}%</div>
            ${te!==null?`<div class="mini" style="margin-top:12px">Time elapsed</div><div class="bar" style="height:11px"><div class="fill lime" style="width:${te}%"></div></div><div style="text-align:right;font-family:var(--mono);font-size:.8rem;margin-top:4px">${te}%</div>
            <div class="report" style="margin-top:14px">${burn>te+12?`Spending is ahead of the timeline (${burn}% of budget vs ${te}% of the term). Worth reviewing burn rate before the next report.`:burn<te-15?`Underspending relative to the timeline (${burn}% spent vs ${te}% elapsed) — funds may need to be deployed faster.`:`Spending is well-paced: ${burn}% of budget against ${te}% of the grant term.`}</div>`:''}
          </div>
          <div class="card" style="margin-bottom:18px"><div class="card-head"><h3>Expenses</h3><span class="hint">Spent = sum of entries</span></div>
            <p class="hint" style="margin-bottom:10px">Finance is logged by the manager, not staff. Each expense backs the “Spent” figure with an invoice.</p>
            <div class="row3">
              <label class="field" style="margin-bottom:8px">Amount ($)<input id="ex_amt" type="number" placeholder="5000"></label>
              <label class="field" style="margin-bottom:8px">Category<input id="ex_cat" placeholder="e.g. Venue"></label>
              <label class="field" style="margin-bottom:8px">Invoice ref<input id="ex_inv" placeholder="inv-001.pdf"></label>
            </div>
            <button class="btn sm" onclick="addExpense('${g.id}')">${svg(I.plus)} Log expense</button>
            <div class="mini" style="margin-top:14px">Ledger</div>
            ${grantExpenses(g.id).length?`<table><thead><tr><th>Date</th><th>Category</th><th class="num">Amount</th><th>Invoice</th></tr></thead><tbody>${grantExpenses(g.id).map(e=>`<tr><td>${e.date}</td><td>${e.category}</td><td class="num">${fmt$(e.amount)}</td><td><button class="ev-file" style="padding:4px 9px" onclick="openEvidence('','${e.invoice||'—'}')">${svg(I.report)} ${e.invoice||'—'}</button></td></tr>`).join('')}<tr><td colspan="2"><b>Total spent</b></td><td class="num"><b>${fmt$(grantSpent(g))}</b></td><td></td></tr></tbody></table>`:emptyState('No expenses logged yet.')}
          </div>
          <div class="card"><div class="card-head"><h3>Reporting</h3></div>
            <div class="timeline-h">${timeline}</div>
            <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">${d.current?`<span class="alert-pill">${svg(I.alert)} ${d.current.label} stage active</span>`:'<span class="hint">No reminder stage active.</span>'}<button class="btn ghost sm" onclick="sendReminder('${g.id}')">${svg(I.mail)} Send reminder</button></div>
          </div>
        </div>
      </div>`;
  },

  agreement(){
    const g=db.grants.find(x=>x.id===(db.agGrant||db.grants[0].id))||db.grants[0];
    db.agGrant=g.id;
    const b=branch(g.branchId)||{name:'(no linked program)',metrics:[],audience:''};
    const cs=g.commitments||[];
    const h=agreementHealth(g);
    const rows=cs.map(c=>{const r=commitmentActual(g,c);const st=r.met?'<span class="badge b-ok">Met</span>':r.pct>=65?'<span class="badge b-warn">On track</span>':'<span class="badge b-bad">Behind</span>';return `<tr><td><b>${c.label}</b><div class="hint" style="font-size:.74rem">${r.sub} · from ${r.src}</div></td><td class="num">${r.display.split(' / ')[0]}</td><td class="num">${Math.min(999,r.pct)}%</td><td>${st}</td></tr>`;}).join('');
    // KPI tiles
    const tiles=cs.map(c=>{const r=commitmentActual(g,c);const parts=r.display.split(' / ');return `<div class="card kpi"><div class="label">${c.label}</div><div class="num">${parts[0]}${parts[1]?` <small>/ ${parts[1]}</small>`:''}</div><div class="meta ${r.met?'up':r.pct>=65?'warn':'bad'}">${Math.min(999,r.pct)}% · ${r.met?'met':r.pct>=65?'on track':'behind'}</div><div class="bar"><div class="fill ${r.met?'lime':''}" style="width:${Math.min(100,r.pct)}%"></div></div></div>`;}).join('');
    // chart
    const bars=cs.map(c=>{const r=commitmentActual(g,c);const pct=Math.min(100,r.pct);return `<div class="col"><div class="pct ${r.met?'up':''}">${Math.min(999,r.pct)}%</div><div class="track"><div class="val ${r.met?'lead':''}" style="height:${Math.max(6,pct)}%"></div></div><div class="cap">${c.label.split(' ').slice(0,2).join(' ')}</div></div>`;}).join('');

    const locked=cs.length>0 && !db.agEdit;
    return `
      <div class="card" style="margin-bottom:18px">
        <div class="card-head"><h3>${locked?'Grant agreement':'Analyse a grant agreement'}</h3><span class="badge b-info">Pick any grant</span></div>
        <label class="field">Grant to analyse<select onchange="db.agGrant=this.value;db.agEdit=false;render()">${db.grants.map(x=>`<option value="${x.id}" ${x.id===g.id?'selected':''}>${x.name} — ${x.funder}</option>`).join('')}</select></label>
        ${locked?`
          <div class="locked-agreement">
            <div style="display:flex;align-items:center;gap:9px;margin-bottom:8px"><span class="badge b-ok">${svg(I.lock)} Agreement locked</span><span class="hint">${cs.length} commitments saved to this grant — no need to paste again.</span></div>
            <p class="hint" style="font-style:italic;white-space:pre-wrap;max-height:80px;overflow:auto">“${(g.agreementText||'').slice(0,300)}${(g.agreementText||'').length>300?'…':''}”</p>
            <button class="btn ghost sm" style="margin-top:8px" onclick="db.agEdit=true;render()">${svg(I.pen)} Update agreement</button>
          </div>`:`
          <p class="hint" style="margin-bottom:12px">Paste the agreement once. The engine extracts its commitments and <b>locks them to this grant</b>, then analyses progress against <b>${b.name}</b>'s verified data.</p>
          <label class="field" style="margin-bottom:8px">Agreement text<textarea id="ag_text" style="min-height:90px" placeholder="e.g. The grantee will train 500 participants, deliver 25 workshops, ensure 40% women participation, and spend under $150,000.">${g.agreementText||''}</textarea></label>
          <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn" onclick="runExtract('${g.id}')">${svg(I.spark)} ${cs.length?'Re-extract & lock':'Extract & lock'}</button><button class="btn ghost" onclick="document.getElementById('ag_text').value=db.SAMPLE;">Sample</button>${cs.length?`<button class="btn ghost" onclick="db.agEdit=false;render()">Cancel</button>`:''}</div>`}
      </div>

      ${!cs.length?`<div class="card">${emptyState('No commitments yet — paste the agreement (or tap “Sample”) and Extract & analyse.')}</div>`:`
      <div class="grid kpis" style="margin-bottom:18px">
        <div class="card kpi" style="background:linear-gradient(135deg,var(--green),var(--green-700));color:#fff;border:0">
          <div class="label" style="color:#bfe0cf">Agreement health</div>
          <div class="num" style="color:#fff">${h.overall}<small style="color:#bfe0cf">%</small></div>
          <div class="meta" style="color:var(--lime)">${h.met} of ${h.total} commitments met</div>
          <div class="bar" style="background:rgba(255,255,255,.2)"><div class="fill lime" style="width:${h.overall}%"></div></div>
        </div>
        ${tiles}
      </div>
      <div class="grid c2">
        <div class="card"><div class="card-head"><h3>Commitment progress</h3><span class="badge b-info">vs verified data</span></div><div class="chart">${bars}</div></div>
        <div class="card"><div class="card-head"><h3>Plain-language summary</h3></div><div class="report">${agreementSummary(g)}</div>
          <div class="mini" style="margin-top:14px">Commitment detail</div>
          <table><thead><tr><th>Commitment</th><th class="num">Verified</th><th class="num">%</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>
        </div>
      </div>`}
    `;
  },

  deadlines(){
    const cards=db.grants.slice().sort((a,b)=>daysUntil(a.nextReport)-daysUntil(b.nextReport)).map(g=>{
      const d=dueStatus(g);
      const timeline=DEADLINE_STAGES.map(s=>{const done=d.n<=s.offset;const isCur=d.current&&d.current.key===s.key;return `<div class="tl-step ${done?'done':''} ${isCur?'cur':''}"><span class="tl-dot"></span><div><b>${s.label}</b><span class="hint" style="display:block;font-size:.74rem">${s.offset===0?'on due date':s.offset+' days before'}</span></div></div>`;}).join('');
      const badge=d.n<0?'<span class="badge b-bad">Overdue</span>':d.n<=3?'<span class="badge b-bad">'+d.n+'d left</span>':d.n<=7?'<span class="badge b-warn">'+d.n+'d left</span>':d.n<=14?'<span class="badge b-warn">'+d.n+'d left</span>':'<span class="badge b-ok">'+d.n+'d left</span>';
      return `<div class="card" style="margin-bottom:16px"><div class="card-head"><div><h3>${g.name}</h3><div class="hint">${g.funder} · report due ${g.nextReport}</div></div>${badge}</div>
        <div class="timeline-h">${timeline}</div>
        <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
          ${d.current?`<span class="alert-pill">${svg(I.alert)} Stage active: ${d.current.label}</span>`:'<span class="hint">No reminder stage active yet.</span>'}
          <button class="btn ghost sm" onclick="sendReminder('${g.id}')">${svg(I.mail)} Send reminder now</button>
          <button class="btn sm" onclick="db.activeBranch='${g.branchId}';db.reportTab='specific';go('reports')">${svg(I.report)} Start report</button>
        </div></div>`;
    }).join('');
    return `<div class="lock-note">${svg(I.cal)} The engine watches every deadline and auto-sends staged reminders: a draft nudge at 14 days, reminders at 7 and 3 days, and an escalation on the due date.</div>${cards}`;
  },

  evidence(){
    const logs=db.logs.filter(l=>l.status==='approved'&&l.attachments&&l.attachments.length);
    return `<div class="lock-note">${svg(I.report)} Every approved log can carry proof — photos, attendance sheets, PDFs, certificates. When a funder asks “can you prove it?”, it's one click away.</div>
      <div class="toolbar"><div class="search">${svg(I.search)}<input id="evSearch" placeholder="Search by program or activity…" oninput="render()"></div></div>
      ${logs.filter(evMatch).map(l=>`<div class="card" style="margin-bottom:14px"><div class="card-head"><div><h3 style="font-size:1rem">${branch(l.branchId)?.name} · ${l.date}</h3><div class="hint">${l.narrative}</div></div><span class="badge b-ok">Verified</span></div>
        <div class="ev-files">${l.attachments.map(a=>`<button class="ev-file" onclick="openEvidence('${(a.url||'')}','${a.name}')">${svg(a.type==='image'?I.eye:I.report)} ${a.name}</button>`).join('')}</div></div>`).join('')||emptyState('No evidence files on approved logs yet — staff can attach them in the daily log.')}`;
  },

  team(){
    return `<div class="lock-note">${svg(I.users)} Report quality depends on staff keeping logs current. This tracks each person's log-completion rate.</div>
      <div class="grid kpis" style="margin-bottom:18px">${db.staff.map(s=>{const c=compliance(s);const cls=c>=90?'up':c>=80?'warn':'bad';return `<div class="card kpi"><div class="label">${s.name}</div><div class="num">${c}<small>%</small></div><div class="meta ${cls}">${s.submitted}/${s.expected} logs</div><div class="bar"><div class="fill ${c>=90?'lime':''}" style="width:${c}%"></div></div></div>`;}).join('')}</div>
      <div class="card"><div class="card-head"><h3>Why this matters</h3></div><div class="report">Average team compliance is <b>${avgCompliance()}%</b>. Anyone below 85% risks gaps in the data that funder reports are built from. ${db.staff.filter(s=>compliance(s)<85).map(s=>s.name).join(', ')||'Everyone is on track.'}${db.staff.some(s=>compliance(s)<85)?' may need a gentle nudge.':''}</div></div>`;
  },

  exec(){
    const e=execStats();
    const tile=(label,val,sub,lime)=>`<div class="card kpi exec-tile"><div class="label">${label}</div><div class="num">${val}</div>${sub?`<div class="meta ${lime?'up':''}">${sub}</div>`:''}</div>`;
    const dueSoon=db.grants.filter(g=>daysUntil(g.nextReport)<=14).sort((a,b)=>daysUntil(a.nextReport)-daysUntil(b.nextReport));
    return `<div class="lock-note">${svg(I.spark)} The whole organisation on one screen — built for the board, leadership and funders.</div>
      <div class="grid kpis">
        ${tile('Funding active',fmt$(e.funding),db.grants.length+' grants',true)}
        ${tile('People reached',e.people,'across all programs')}
        ${tile('Programs running',e.programs,'active')}
        ${tile('Reports due',e.reportsDue,'within 14 days',false)}
        ${tile('Impact score',e.impact+'%','composite of goals',true)}
        ${tile('Team compliance',e.compliance+'%','log completion',true)}
      </div>
      <div style="height:18px"></div>
      <div class="grid c2">
        <div class="card"><div class="card-head"><h3>Programs</h3></div><table><thead><tr><th>Program</th><th class="num">Reached</th><th class="num">Impact</th></tr></thead><tbody>${db.branches.map(b=>{const m=b.metrics.find(x=>x.type==='number');return `<tr><td><b>${b.name}</b></td><td class="num">${m?agg(b,m):'—'}</td><td class="num">${impact(b)}%</td></tr>`;}).join('')}</tbody></table></div>
        <div class="card"><div class="card-head"><h3>Upcoming report deadlines</h3></div>${dueSoon.length?dueSoon.map(g=>`<div class="queue-item"><div class="qi-head"><div class="ico" style="background:var(--warn-bg);color:var(--warn)">${svg(I.cal)}</div><div class="body"><b>${g.name}</b><p>${g.funder} · due ${g.nextReport}</p></div>${deadlineBadge(g.nextReport)}</div></div>`).join(''):emptyState('No deadlines in the next 14 days.')}</div>
      </div>`;
  },

  reports(){
    const b=activeBranch();
    return `<div class="tabs">
      <button class="${db.reportTab==='overview'?'on':''}" onclick="setRTab('overview')">Project Overview</button>
      <button class="${db.reportTab==='specific'?'on':''}" onclick="setRTab('specific')">Funder Report (Q&A)</button>
      <button class="${db.reportTab==='list'?'on':''}" onclick="setRTab('list')">Drafts & Sent</button>
    </div>
    ${db.reportTab==='overview'?overviewTab(b):db.reportTab==='specific'?specificTab(b):listTab()}`;
  },

  funder(){
    const b=activeBranch();
    const approved=db.reports.filter(r=>r.status==='approved'&&r.branchId===b.id);
    return `<div class="lock-note">${svg(I.lock)} Read-only funder view for ${b.name} — approved outcomes only. Private staff logs are never exposed here.</div>
      <div class="grid kpis">${b.metrics.filter(m=>m.dash&&m.target).map(m=>{const a=agg(b,m),pct=Math.min(100,Math.round(a/m.target*100));return `<div class="card kpi"><div class="label">${m.label}</div><div class="num">${a} <small>/ ${m.target}</small></div><div class="bar"><div class="fill lime" style="width:${pct}%"></div></div></div>`;}).join('')}
      <div class="card kpi"><div class="label">Impact score</div><div class="num">${impact(b)} <small>/ 100</small></div></div></div>
      <div style="height:18px"></div>
      <div class="card"><div class="card-head"><h3>Approved reports</h3></div>${approved.length?approved.slice().reverse().map(r=>`<div class="queue-item"><div class="qi-head"><div class="ico">${svg(I.report)}</div><div class="body"><b>${r.title}</b><p>${r.period} · ${r.format||'Funder report'}</p></div><button class="btn sm ghost" onclick="printReport(${r.id})">${svg(I.print)} View</button></div></div>`).join(''):emptyState('No approved reports published yet.')}</div>`;
  },

  activity(){return `<div class="card"><div class="mini">Audit trail</div>${db.activity.slice().reverse().map(a=>`<div class="activity-row"><span class="tdot"></span><div><b>${a.actor}</b> ${a.text}</div><span class="at">${a.ts}</span></div>`).join('')}</div>`;},

  /* ---- staff ---- */
  log(){
    const editing=db.editingLogId?db.logs.find(x=>x.id===db.editingLogId):null;
    if(editing)db.activeBranch=editing.branchId;
    const opts=db.branches.map(b=>`<option value="${b.id}" ${b.id===db.activeBranch?'selected':''}>${b.name}</option>`).join('');
    const b=activeBranch();
    const banner=editing?`<div class="lock-note warn-note">${svg(I.pen)} Revising your submission. Manager asked: <b>${editing.note||'please review'}</b></div>`:'';
    return `<div class="grid c2">
      <div class="card">${banner}<div class="card-head"><h3>${editing?'Revise daily log':'New daily log'}</h3></div>
        <label class="field">Program<select id="f_branch" onchange="setBranch(this.value)" ${editing?'disabled':''}>${opts}</select></label>
        <label class="field">What did you do today?<textarea id="f_narr" placeholder="Describe the session, activity or work delivered…">${editing?editing.narrative:''}</textarea></label>
        ${b.metrics.map(m=>logField(m,editing?editing.values[m.id]:undefined)).join('')}
        <label class="field">Attach evidence (photos, PDFs, sheets)<input id="f_files" type="file" multiple></label>
        <button class="btn" onclick="submitLog()">${svg(I.check)} ${editing?'Resubmit for review':'Submit for verification'}</button>
        ${editing?`<button class="btn ghost" style="margin-left:8px" onclick="cancelEdit()">Cancel</button>`:''}
      </div>
      <div class="card"><div class="card-head"><h3>How this counts</h3></div><p class="hint" style="margin-bottom:14px">These fields are defined by the <b>${b.name}</b> program — every program logs different things.</p>
        ${['You submit verified work with evidence','A manager reviews — Accept, Request changes, or Deny','Any note comes back to you here','On Accept, numbers update everywhere and feed funder reports'].map((s,i)=>`<div style="display:flex;gap:11px;align-items:center;margin-bottom:9px"><span style="width:26px;height:26px;border-radius:8px;background:var(--green);color:var(--lime);font-family:var(--mono);font-weight:700;display:grid;place-items:center;font-size:.82rem">${i+1}</span><span style="font-size:.9rem">${s}</span></div>`).join('')}
      </div></div>`;
  },
  mylogs(){
    const mine=db.logs.filter(l=>l.staff===db.session.name).slice().reverse();
    if(!mine.length)return emptyState('No submissions yet — your logs will appear here.');
    return mine.map(l=>{
      const noteBox=l.note?`<div class="mgr-note ${l.status==='rejected'?'bad':l.status==='changes'?'warn':'ok'}">${svg(I.pen)} <b>Manager note:</b> ${l.note}</div>`:'';
      const action=l.status==='changes'?`<button class="btn sm" onclick="editLog(${l.id})">${svg(I.pen)} Revise & resubmit</button>`:'';
      return `<div class="queue-item"><div class="qi-head"><div class="ico">${svg(I.pen)}</div><div class="body"><b>${branch(l.branchId)?.name} · ${l.date}</b><p>${l.narrative}</p></div><div class="acts">${statusBadge(l.status)}</div></div>${noteBox}${action?`<div style="margin-top:10px">${action}</div>`:''}</div>`;
    }).join('');
  },
  myimpact(){
    const mine=db.logs.filter(l=>l.staff===db.session.name&&l.status==='approved');
    const byBranch={};mine.forEach(l=>{byBranch[l.branchId]=(byBranch[l.branchId]||0)+1;});
    return `<div class="lock-note">${svg(I.spark)} Your approved contribution. Program-wide dashboards are managed by your Program Manager.</div>
      <div class="grid kpis"><div class="card kpi"><div class="label">Approved logs</div><div class="num">${mine.length}</div></div><div class="card kpi"><div class="label">Programs contributed to</div><div class="num">${Object.keys(byBranch).length}</div></div><div class="card kpi"><div class="label">Pending review</div><div class="num">${db.logs.filter(l=>l.staff===db.session.name&&l.status==='pending').length}</div></div><div class="card kpi"><div class="label">Needs changes</div><div class="num">${db.logs.filter(l=>l.staff===db.session.name&&l.status==='changes').length}</div></div></div>`;
  },
  /* ---- funder ---- */
  fdash(){
    const fid=db.session.funderId, brs=funderBranches(fid);
    if(!brs.includes(db.activeBranch))db.activeBranch=brs[0]||db.activeBranch;
    const b=activeBranch();
    const myGrants=funderGrants(fid).filter(g=>g.branchId===b.id);
    return `<div class="lock-note">${svg(I.lock)} You are viewing <b>${b.name}</b> as ${db.session.name}. This is read-only and shows manager-approved outcomes only — never private staff data.</div>
      <div class="grid kpis">
        ${b.metrics.filter(m=>m.dash&&m.target).map(m=>{const a=agg(b,m),pct=Math.min(100,Math.round(a/m.target*100));return `<div class="card kpi"><div class="label">${m.label}</div><div class="num">${a} <small>/ ${m.target}</small></div><div class="meta up">${pct}% of goal</div><div class="bar"><div class="fill lime" style="width:${pct}%"></div></div></div>`;}).join('')}
        <div class="card kpi"><div class="label">Impact score</div><div class="num">${impact(b)} <small>/ 100</small></div></div>
      </div>
      <div style="height:18px"></div>
      <div class="card"><div class="card-head"><h3>Your funding in this program</h3></div><table><thead><tr><th>Grant</th><th class="num">Committed</th><th class="num">Deployed</th><th>Next report</th></tr></thead><tbody>${myGrants.map(g=>`<tr><td><b>${g.name}</b></td><td class="num">${fmt$(g.amount)}</td><td class="num">${fmt$(grantSpent(g))} (${Math.round(grantSpent(g)/g.amount*100)}%)</td><td>${g.nextReport}</td></tr>`).join('')||'<tr><td colspan="4">—</td></tr>'}</tbody></table></div>`;
  },
  freports(){
    const fid=db.session.funderId, brs=funderBranches(fid);
    const reps=db.reports.filter(r=>r.status==='approved'&&brs.includes(r.branchId));
    return `<div class="lock-note">${svg(I.report)} Reports AIRI has approved and shared with ${db.session.name}.</div>
      <div class="card">${reps.length?reps.slice().reverse().map(r=>`<div class="queue-item"><div class="qi-head"><div class="ico">${svg(I.report)}</div><div class="body"><b>${r.title}</b><p>${branch(r.branchId)?.name} · ${r.period}</p></div><button class="btn sm ghost" onclick="printReport(${r.id})">${svg(I.print)} Open</button></div></div>`).join(''):emptyState('No reports have been shared with you yet.')}</div>`;
  }
};

/* ---- report tabs ---- */
function periodControls(){
  return `<div class="mini">Reporting period</div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px">
      ${[['1 month',1],['3 months',3],['1 year',12],['2 years',24]].map(([l,m])=>`<button class="btn ghost sm" onclick="setPeriod(${m})">${l}</button>`).join('')}
    </div>
    <div class="row2"><label class="field">From<input type="date" id="r_from" value="${rp.from}"></label><label class="field">To<input type="date" id="r_to" value="${rp.to}"></label></div>`;
}
function overviewTab(b){
  return `<div class="grid c2">
    <div class="card"><div class="card-head"><h3>Project Overview generator</h3></div>
      <p class="hint" style="margin-bottom:14px">A reusable, funder-agnostic overview of <b>${b.name}</b> built from verified data — solid enough to adapt into future grant proposals.</p>
      ${periodControls()}
      <label class="field">Extra context to strengthen it (optional)<textarea id="o_ctx" placeholder="Partnerships, testimonials, future plans, differentiators…"></textarea></label>
      <button class="btn" onclick="genOverview()">${svg(I.report)} Generate overview</button>
    </div>
    <div class="card"><div class="card-head"><h3>Preview</h3></div><div id="o_prev">${emptyState('Generate to preview the overview.')}</div></div>
  </div>`;
}
function specificTab(b){
  const gs=grantsFor(b.id);
  return `<div class="grid c2">
    <div class="card"><div class="card-head"><h3>Funder report — answer their questions</h3></div>
      <label class="field">Funder / grant<select id="s_grant">${gs.map(g=>`<option value="${g.id}">${g.name} — ${g.funder}</option>`).join('')||'<option>No grants for this program</option>'}</select></label>
      ${periodControls()}
      <label class="field">Paste the funder's questions (one per line)<textarea id="s_q" style="min-height:120px" placeholder="What outcomes were achieved this period?&#10;How was funding used?&#10;How are you advancing equity?"></textarea></label>
      <button class="btn" onclick="genSpecific()">${svg(I.spark)} Draft answers from verified data</button>
    </div>
    <div class="card"><div class="card-head"><h3>Drafted answers</h3></div><div id="s_prev">${emptyState('Paste questions and draft to see grounded answers.')}</div></div>
  </div>`;
}
function listTab(){
  if(!db.reports.length)return `<div class="card">${emptyState('No reports yet. Generate one in the Overview or Funder Report tab.')}</div>`;
  return `<div class="card">${db.reports.slice().reverse().map(r=>`<div class="queue-item"><div class="qi-head"><div class="ico">${svg(r.type==='overview'?I.layers:I.report)}</div><div class="body"><b>${r.title}</b><p>${branch(r.branchId)?.name} · ${r.period} · ${statusBadge(r.status)}</p></div><div class="acts">
    ${r.status==='pending'?`<button class="btn sm ok" onclick="approveReport(${r.id})">${svg(I.check)} Approve</button><button class="btn sm danger-ghost" onclick="rejectReport(${r.id})">Reject</button>`:''}
    ${r.status==='approved'?`<button class="btn sm lime" onclick="emailReport(${r.id})">${svg(I.mail)} Email funder</button><button class="btn sm ghost" onclick="printReport(${r.id})">${svg(I.print)} View</button>`:''}
    ${r.status==='rejected'?`<button class="btn sm ghost" onclick="printReport(${r.id})">View</button>`:''}
  </div></div></div>`).join('')}</div>`;
}

/* ---- partials ---- */
function logField(m,val){
  if(m.type==='number')return `<label class="field">${m.label}<input id="m_${m.id}" type="number" min="0" value="${val!==undefined?val:0}"></label>`;
  if(m.type==='yesno')return `<label class="field">${m.label}?<select id="m_${m.id}"><option value="no" ${val?'':'selected'}>No</option><option value="yes" ${val?'selected':''}>Yes</option></select></label>`;
  return `<label class="field">${m.label}<input id="m_${m.id}" value="${val!==undefined?val:''}" placeholder="Link or note to verify the outcome"></label>`;
}
function cancelEdit(){db.editingLogId=null;go('mylogs');}
function queueHTML(compact){
  const logs=allPending(),reps=db.reports.filter(r=>r.status==='pending');
  const flags=compact?[]:db.grants.filter(g=>grantSpent(g)/g.amount>0.7);
  if(!logs.length&&!reps.length&&!flags.length)return emptyState('All caught up — nothing awaiting review.');
  let h='';
  logs.forEach(l=>{
    const b=branch(l.branchId);
    h+=`<div class="queue-item"><div class="qi-head"><div class="ico">${svg(I.pen)}</div><div class="body"><b>${l.staff} · ${b.name}</b><p>${l.narrative}</p></div><div class="acts"><button class="btn sm ghost" onclick="toggleEdit(${l.id})">Review</button></div></div>
      <div class="edit-grid" id="ed_${l.id}">
        <div class="mini">You can correct the figures, then choose an action. Your note is sent to ${l.staff}.</div>
        <label class="field">Narrative<textarea id="e_${l.id}_narr">${l.narrative}</textarea></label>
        <div class="row3">${b.metrics.map(m=>editField(l,m)).join('')}</div>
        <label class="field">Note to ${l.staff}<input id="e_${l.id}_note" value="${l.note||''}" placeholder="e.g. Please attach the sign-in sheet, then resubmit"></label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn ok sm" onclick="actLog(${l.id},'approved')">${svg(I.check)} Accept</button>
          <button class="btn sm" style="background:var(--warn)" onclick="actLog(${l.id},'changes')">${svg(I.pen)} Request changes</button>
          <button class="btn danger-ghost sm" onclick="actLog(${l.id},'rejected')">Deny</button>
        </div>
      </div></div>`;
  });
  reps.forEach(r=>{h+=`<div class="queue-item"><div class="qi-head"><div class="ico">${svg(I.report)}</div><div class="body"><b>Report draft · ${r.title}</b><p>${branch(r.branchId)?.name} · ${r.period}</p></div><div class="acts"><button class="btn sm ok" onclick="approveReport(${r.id})">${svg(I.check)} Approve</button><button class="btn sm danger-ghost" onclick="rejectReport(${r.id})">Reject</button></div></div></div>`;});
  flags.forEach(g=>{h+=`<div class="queue-item"><div class="qi-head"><div class="ico" style="background:var(--bad-bg);color:var(--bad)">${svg(I.alert)}</div><div class="body"><b>Budget variance · ${g.name}</b><p>Spending at ${Math.round(grantSpent(g)/g.amount*100)}% of budget.</p></div><span class="badge b-warn">Flag</span></div></div>`;});
  return h;
}
function editField(l,m){
  const v=l.values[m.id];
  if(m.type==='number')return `<label class="field">${m.label}<input id="e_${l.id}_${m.id}" type="number" value="${v||0}"></label>`;
  if(m.type==='yesno')return `<label class="field">${m.label}?<select id="e_${l.id}_${m.id}"><option value="no" ${!v?'selected':''}>No</option><option value="yes" ${v?'selected':''}>Yes</option></select></label>`;
  return `<label class="field">${m.label}<input id="e_${l.id}_${m.id}" value="${v||''}"></label>`;
}
function emptyState(m){return `<div class="empty">${svg(I.check)}<p>${m}</p></div>`;}
function grantName(id){return db.grants.find(g=>g.id===id)?.name||'Grant';}

/* ===================== ACTIONS ===================== */
function readAttachments(){
  const el=document.getElementById('f_files');const out=[];
  if(el&&el.files)for(const f of el.files){let url='';try{url=URL.createObjectURL(f);}catch(e){}out.push({name:f.name,type:/^image\//.test(f.type)?'image':'pdf',url});}
  return out;
}
function submitLog(){
  const b=branch(document.getElementById('f_branch').value);
  const values={};b.metrics.forEach(m=>{const el=document.getElementById('m_'+m.id);if(!el)return;values[m.id]=m.type==='number'?(+el.value||0):m.type==='yesno'?el.value==='yes':el.value;});
  const narrative=document.getElementById('f_narr').value||'(no description)';
  const atts=readAttachments();
  if(db.editingLogId){
    const l=db.logs.find(x=>x.id===db.editingLogId);
    l.branchId=b.id;l.narrative=narrative;l.values=values;l.status='pending';l.note='';if(atts.length)l.attachments=(l.attachments||[]).concat(atts);
    db.editingLogId=null;logActivity(db.session.name,'revised & resubmitted a log for '+b.name);
    toast('Revision resubmitted for review');go('mylogs');return;
  }
  const log={id:++db.logSeq,branchId:b.id,date:ISO(TODAY),staff:db.session.name,narrative,values,attachments:atts,note:'',status:'pending'};
  db.logs.push(log);
  const s=db.staff.find(x=>x.name===db.session.name);if(s){s.submitted++;if(s.submitted>s.expected)s.expected=s.submitted;}
  logActivity(db.session.name,'submitted a daily log for '+b.name);
  toast('Log submitted — sent to manager for verification');go('mylogs');
}
function editLog(id){db.editingLogId=id;const l=db.logs.find(x=>x.id===id);db.activeBranch=l.branchId;go('log');}
function toggleEdit(id){document.getElementById('ed_'+id)?.classList.toggle('show');}
function actLog(id,decision){
  const l=db.logs.find(x=>x.id===id);if(!l)return;const b=branch(l.branchId);
  const note=document.getElementById('e_'+id+'_note')?.value.trim()||'';
  if((decision==='changes'||decision==='rejected')&&!note)return toast(decision==='changes'?'Add a note telling staff what to change':'Add a note explaining the denial');
  // manager corrections apply to all decisions (so an accepted log reflects edits)
  l.narrative=document.getElementById('e_'+id+'_narr')?.value??l.narrative;
  b.metrics.forEach(m=>{const el=document.getElementById('e_'+id+'_'+m.id);if(!el)return;l.values[m.id]=m.type==='number'?(+el.value||0):m.type==='yesno'?el.value==='yes':el.value;});
  l.note=note;l.status=decision;
  const verb={approved:'accepted',changes:'requested changes on',rejected:'denied'}[decision];
  logActivity('Manager',verb+' '+l.staff+'\u2019s log'+(note?' — note sent':''));
  toast({approved:'Accepted — figures updated across the system',changes:l.staff+' notified to revise & resubmit',rejected:'Denied — '+l.staff+' notified'}[decision]);
  render();
}

/* program wizard */
let wiz={name:'',aim:'',audience:'',metrics:[],gName:'',gFunder:'',gEmail:'',gAmount:'',gReport:'',gAgreement:''};
function resetWiz(){wiz={name:'',aim:'',audience:'',metrics:[],gName:'',gFunder:'',gEmail:'',gAmount:'',gReport:'',gAgreement:''};}
function wizAdd(){wiz.metrics.push({label:'',type:'number',target:''});renderWizRows();}
function wizAddPreset(label,type){
  if(wiz.metrics.some(m=>m.label===label))return;
  wiz.metrics.push({label,type,target:type==='number'?(label.includes('Women')?200:500):type==='yesno'?25:''});
  renderWizRows();
}
function wizDel(i){wiz.metrics.splice(i,1);renderWizRows();}
function wizSet(i,f,v){wiz.metrics[i][f]=v;if(f==='type')renderWizRows();else updateWizPreview();}
function renderWizRows(){
  const el=document.getElementById('wizRows');if(!el)return;
  el.innerHTML=wiz.metrics.map((m,i)=>`<div class="metric-row">
    <input value="${m.label}" placeholder="What to record (e.g. People reached)" oninput="wizSet(${i},'label',this.value)">
    <select onchange="wizSet(${i},'type',this.value)"><option value="number" ${m.type==='number'?'selected':''}>A number to add up</option><option value="yesno" ${m.type==='yesno'?'selected':''}>A yes/no to tally</option><option value="text" ${m.type==='text'?'selected':''}>A note or link</option></select>
    ${m.type==='text'?'<span class="lockedrow" style="font-size:.76rem">no target</span>':`<input type="number" value="${m.target}" placeholder="target (optional)" oninput="wizSet(${i},'target',this.value)">`}
    <button class="del" onclick="wizDel(${i})" title="Remove">✕</button>
  </div>`).join('')||'<p class="hint" style="padding:6px 0">No extra fields yet — tap a suggestion above or "Add my own".</p>';
  updateWizPreview();
}
function updateWizPreview(){
  const lp=document.getElementById('wizPreviewLog'),dp=document.getElementById('wizPreviewDash');if(!lp||!dp)return;
  const named=wiz.metrics.filter(m=>m.label.trim());
  lp.innerHTML=`<div class="prev-field"><span class="prev-lbl">What did you do today?</span><div class="prev-input tall">…</div></div>`+(named.map(m=>{
    const ctrl=m.type==='yesno'?'<div class="prev-input">No ▾</div>':m.type==='text'?'<div class="prev-input">type a note…</div>':'<div class="prev-input">0</div>';
    return `<div class="prev-field"><span class="prev-lbl">${m.label}${m.type==='yesno'?'?':''}</span>${ctrl}</div>`;
  }).join('')||'<p class="hint">Add something to see it here.</p>');
  const dashM=named.filter(m=>m.type!=='text');
  dp.innerHTML=dashM.length?dashM.map(m=>`<div class="prev-kpi"><span>${m.label}</span><b>0${m.target?' / '+m.target:''}</b></div>`).join(''):'<p class="hint">Numbers and yes/no tallies appear here automatically.</p>';
}
function createProgram(){
  if(!wiz.name.trim()){toast('Give the program a name first');return;}
  const id='b'+(++db.branchSeq);
  const metrics=wiz.metrics.filter(m=>m.label.trim()).map((m,i)=>({id:'m'+i+'_'+id,label:m.label.trim(),type:m.type,target:m.type==='text'?0:(+m.target||0),unit:'',dash:m.type!=='text',base:0}));
  if(!metrics.length){toast('Add at least one thing to record');return;}
  const b={id,name:wiz.name.trim(),aim:wiz.aim.trim()||'—',audience:wiz.audience.trim()||'—',metrics};
  db.branches.push(b);
  logActivity('Manager','created a new program: '+b.name);
  let createdGrant=null;
  if((wiz.gFunder&&wiz.gFunder.trim())||(+wiz.gAmount>0)||(wiz.gAgreement&&wiz.gAgreement.trim())){
    const gid='g'+(db.grants.length+1);
    const commitments=wiz.gAgreement&&wiz.gAgreement.trim()?extractCommitments(wiz.gAgreement,b):[];
    createdGrant={id:gid,branchId:id,name:(wiz.gName&&wiz.gName.trim())||(b.name+' Grant'),funder:(wiz.gFunder&&wiz.gFunder.trim())||'Funder',email:(wiz.gEmail&&wiz.gEmail.trim())||'funder@example.org',amount:+wiz.gAmount||0,spent:0,start:ISO(TODAY),end:'2027-06-04',nextReport:wiz.gReport||'2026-09-01',agreementText:wiz.gAgreement||'',commitments};
    db.grants.push(createdGrant);
    logActivity('Manager','added grant “'+createdGrant.name+'”'+(commitments.length?` and extracted ${commitments.length} commitments`:''));
  }
  db.activeBranch=id;
  const hadCommitments=createdGrant&&createdGrant.commitments.length;
  resetWiz();
  if(hadCommitments){db.agGrant=createdGrant.id;toast('Program + grant created — analysing the agreement now');go('agreement');}
  else{toast('Program created — now in daily logs & dashboards');go('programs');}
}
function runExtract(gid){
  const g=db.grants.find(x=>x.id===gid);const text=document.getElementById('ag_text').value.trim();
  if(!text){toast('Paste the agreement text first (or tap “Sample”)');return;}
  g.agreementText=text;
  const found=extractCommitments(text,branch(g.branchId)||{metrics:[]});
  if(!found.length){toast('No clear commitments found — try the sample to see the format');return;}
  g.commitments=found;db.agEdit=false;
  logActivity('Automation',`extracted & locked ${found.length} commitments from the ${g.funder} agreement`);
  toast(found.length+' commitments locked to this grant');render();
}
function sendReminder(gid){
  const g=db.grants.find(x=>x.id===gid);const d=dueStatus(g);
  logActivity('Deadline engine',`sent a "${d.current?d.current.label:'status'}" reminder for ${g.name} to the manager`);
  toast('Reminder email sent to manager for '+g.name);render();
}
function evMatch(l){const q=(document.getElementById('evSearch')?.value||'').toLowerCase();return !q||(branch(l.branchId)?.name+' '+l.narrative).toLowerCase().includes(q);}
function openEvidence(url,name){if(url){try{window.open(url,'_blank');return;}catch(e){}}toast('Demo file: '+name+' (real files open when attached in-session)');}
let ng={name:'',branchId:'',funder:'',email:'',amount:'',start:'',end:'',nextReport:'',agreement:''};
function resetNg(){ng={name:'',branchId:db.branches[0]?.id||'',funder:'',email:'',amount:'',start:ISO(TODAY),end:'2027-06-04',nextReport:'',agreement:''};}
function addGrant(){resetNg();go('newgrant');}
function saveGrant(){
  if(!ng.name.trim()){toast('Give the grant a name');return;}
  const id='g'+(db.grants.length+1);
  const linked=ng.branchId?branch(ng.branchId):null;
  const commitments=ng.agreement.trim()&&linked?extractCommitments(ng.agreement,linked):(ng.agreement.trim()?extractCommitments(ng.agreement,{metrics:[]}):[]);
  db.grants.push({id,branchId:ng.branchId||null,name:ng.name.trim(),funder:ng.funder.trim()||'Funder',email:ng.email.trim()||'funder@example.org',amount:+ng.amount||0,spent:0,start:ng.start||ISO(TODAY),end:ng.end||'2027-06-04',nextReport:ng.nextReport||'2026-09-01',agreementText:ng.agreement||'',commitments});
  logActivity('Manager','added grant “'+ng.name.trim()+'”'+(commitments.length?` (locked ${commitments.length} commitments)`:''));
  toast('Grant created'+(commitments.length?` — ${commitments.length} commitments locked in`:''));
  db.viewGrant=id;go('granthub');
}

/* reporting period */
let rp={from:'2026-03-04',to:'2026-06-04'};
function setPeriod(months){
  const to=new Date('2026-06-04');const from=new Date(to);from.setMonth(from.getMonth()-months);
  rp={from:ISO(from),to:ISO(to)};
  const f=document.getElementById('r_from'),t=document.getElementById('r_to');if(f)f.value=rp.from;if(t)t.value=rp.to;
}
function readPeriod(){const f=document.getElementById('r_from'),t=document.getElementById('r_to');if(f)rp.from=f.value;if(t)rp.to=t.value;return `${rp.from} to ${rp.to}`;}
function verifiedLines(b){return b.metrics.filter(m=>m.type!=='text').map(m=>{const a=agg(b,m);return `• ${m.label}: ${a}${m.unit||''}${m.target?` (${Math.round(a/m.target*100)}% of the ${m.target}${m.unit||''} target)`:''}`;}).join('\n');}

function genOverview(){
  const b=activeBranch();const period=readPeriod();const ctx=document.getElementById('o_ctx').value.trim();
  const body=`PROJECT OVERVIEW — ${b.name}\nPeriod: ${period}\n\nABOUT\n${b.aim}\n\nWHO WE SERVE\n${b.audience}\n\nVERIFIED OUTCOMES (manager-approved)\n${verifiedLines(b)}\n\nIMPACT SCORE: ${impact(b)} / 100\n\nFUNDING\n${grantsFor(b.id).map(g=>`• ${g.funder}: ${fmt$(g.amount)} (${Math.round(grantSpent(g)/g.amount*100)}% deployed)`).join('\n')||'• Seeking funding partners'}\n${ctx?`\nADDITIONAL CONTEXT\n${ctx}\n`:''}\nThis overview is built only from verified data and is designed to be adapted into future proposals for this program.`;
  const r={id:++db.reportSeq,type:'overview',branchId:b.id,title:`${b.name} — Project Overview`,period,format:'Project overview',body,status:'pending'};
  db.reports.push(r);logActivity('Automation','generated a project overview for '+b.name);
  document.getElementById('o_prev').innerHTML=`<div class="report">${body}</div><div style="margin-top:12px;display:flex;gap:8px"><span class="badge b-pending">Saved as draft — awaiting approval</span></div>`;
  toast('Overview drafted — see “Drafts & Sent” to approve');
}
function genSpecific(){
  const b=activeBranch();const period=readPeriod();
  const raw=document.getElementById('s_q').value;
  // accept many at once: split on new lines AND on '?' boundaries; drop blanks/numbering
  const qs=raw.split(/\n+/).flatMap(l=>l.split(/(?<=\?)\s+/)).map(x=>x.replace(/^\s*(\d+[\).\]]|[-•*])\s*/,'').trim()).filter(x=>x.length>3);
  if(!qs.length){toast('Paste at least one funder question');return;}
  const g=db.grants.find(x=>x.id===document.getElementById('s_grant').value);
  const qa=qs.map(q=>({q,a:answerFor(q,b,g,period)}));
  const body=`FUNDER REPORT — ${b.name}\nFunder: ${g?g.funder:'—'} · Grant: ${g?g.name:'—'}\nPeriod: ${period}\n\n`+qa.map((x,i)=>`Q${i+1}. ${x.q}\n${x.a}`).join('\n\n')+`\n\nAll figures reflect manager-verified data only.`;
  const r={id:++db.reportSeq,type:'specific',branchId:b.id,grantId:g?.id,title:`${b.name} — ${g?g.funder:'Funder'} report`,period,format:'Funder Q&A report',body,qa,status:'pending'};
  db.reports.push(r);logActivity('Automation',`drafted a funder report (${qs.length} questions) for `+(g?g.funder:b.name));
  document.getElementById('s_prev').innerHTML=`<p class="hint" style="margin-bottom:12px">${qs.length} question${qs.length>1?'s':''} answered from verified data — edit any answer, then approve in “Drafts & Sent”.</p>`+qa.map((x,i)=>`<label class="field">Q${i+1}. ${x.q}<textarea>${x.a}</textarea></label>`).join('')+`<span class="badge b-pending">Saved as draft — awaiting approval</span>`;
  toast(qs.length+' answers drafted from verified data');
}
function answerFor(q,b,g,period){
  const lq=q.toLowerCase();
  const find=(...k)=>b.metrics.find(m=>k.some(w=>m.label.toLowerCase().includes(w)));
  const line=m=>m?`${agg(b,m)}${m.unit||''}${m.target?` (${Math.round(agg(b,m)/m.target*100)}% of the ${m.target}${m.unit||''} target)`:''}`:'';
  const allFigs=goalMetrics(b).map(m=>`${m.label}: ${agg(b,m)}${m.unit||''}`).join('; ')||'verified activity across the program';
  if(/(budget|fund|spent|money|cost|financ|resource)/.test(lq)){
    if(g)return `During ${period}, ${fmt$(grantSpent(g))} of the ${fmt$(g.amount)} ${g.funder} grant was deployed (${Math.round(grantSpent(g)/g.amount*100)}%), directed toward delivery of ${b.name}. Spending is tracked against committed deliverables and reviewed each reporting cycle.`;
    return `Across ${b.name}, ${fmt$(branchSpent(b.id))} of ${fmt$(branchBudget(b.id))} in committed funding has been deployed (${Math.round(branchSpent(b.id)/Math.max(1,branchBudget(b.id))*100)}%).`;
  }
  if(/(women|girl|equity|gender|inclusi|divers|underrepresent|marginal)/.test(lq)){const m=find('women','girl','female','equity');return m?`Equity is central to ${b.name}: during ${period} we reached ${line(m)}. We serve ${b.audience}, and report demographic breakdowns every cycle.`:`We serve ${b.audience} and track participation to advance equitable access; demographic breakdowns are reported each cycle.`;}
  if(/(outcome|impact|achiev|result|deliver|progress|accomplish)/.test(lq)){const main=goalMetrics(b)[0];return `In ${period}, verified outcomes for ${b.name} included ${main?main.label.toLowerCase()+' of '+line(main):'measurable progress'}. Overall verified figures: ${allFigs}. Composite impact score: ${impact(b)}/100 — all manager-verified.`;}
  if(/(reach|participant|people|served|train|student|attend|enrol)/.test(lq)){const m=find('people','student','reach','participant','train')||goalMetrics(b)[0];return `During ${period}, ${b.name} reached ${line(m)}. These figures reflect manager-verified daily logs only.`;}
  if(/(challenge|risk|barrier|difficult|lesson|learn)/.test(lq)){const behind=goalMetrics(b).filter(m=>agg(b,m)/m.target<0.65).map(m=>m.label.toLowerCase());return behind.length?`The main area needing attention this period is ${behind.join(' and ')}, where progress trails target; a corrective plan is in place. Other metrics are on track.`:`No significant delivery risks this period — all tracked metrics are on or near target. We continue to monitor capacity and participant follow-through.`;}
  if(/(sustain|future|next|continue|scale|plan|going forward)/.test(lq)){return `Building on verified results (${allFigs}), ${b.name} plans to consolidate gains, deepen partnerships, and extend reach to more of our target group (${b.audience}) in the next period.`;}
  if(/(partner|collaborat|stakeholder)/.test(lq)){return `${b.name} works with community partners and ${grantsFor(b.id).map(x=>x.funder).join(', ')||'funding partners'} to deliver and verify outcomes. We welcome introductions that extend reach to ${b.audience}.`;}
  const main=goalMetrics(b)[0];
  return `For ${b.name} during ${period}: ${main?main.label+' reached '+line(main)+'. ':''}Verified figures: ${allFigs}. (Drawn from manager-verified logs — add any program-specific detail here.)`;
}
function approveReport(id){const r=db.reports.find(x=>x.id===id);if(!r)return;r.status='approved';logActivity('Manager','approved “'+r.title+'”');toast('Approved — ready to email to funder');render();}
function rejectReport(id){const r=db.reports.find(x=>x.id===id);if(!r)return;r.status='rejected';logActivity('Manager','rejected a report draft');toast('Draft rejected');render();}
function emailReport(id){
  const r=db.reports.find(x=>x.id===id);const g=db.grants.find(x=>x.id===r.grantId)||grantsFor(r.branchId)[0];
  const to=g?g.email:'funder@example.org';
  logActivity('Manager','emailed “'+r.title+'” to '+to);toast('Report emailed to '+to);
  try{const sub=encodeURIComponent('AIRI report: '+r.title);const bd=encodeURIComponent(r.body);window.open(`mailto:${to}?subject=${sub}&body=${bd}`,'_blank');}catch(e){}
  render();
}
function printReport(id){const r=db.reports.find(x=>x.id===id);const w=window.open('','_blank');if(!w)return;w.document.write(`<title>${r.title}</title><pre style="font-family:system-ui;max-width:720px;margin:48px auto;line-height:1.6;white-space:pre-wrap;color:#0e1f18"><h1 style="font-family:sans-serif;color:#084734">${r.title}</h1>${r.body.replace(/</g,'&lt;')}</pre>`);}

render();
</script>
